<!DOCTYPE html><html><head><title>CodeX - Gateway</title><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'>
<style>
:root{--neon:#00f2fe;--pink:#ff007a;--purple:#7928ca;--glass:rgba(10,15,30,0.7);}
body{font-family:monospace;background:#020308;color:#fff;margin:0;height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;}
.city-grid{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(rgba(0,0,0,0.3) 0%,#020308 85%),radial-gradient(circle at 50% 30%,rgba(255,0,122,0.2),transparent 60%),linear-gradient(transparent 50%,rgba(0,242,254,0.05) 50%),linear-gradient(90deg,transparent 50%,rgba(0,242,254,0.05) 50%);background-size:100% 100%,100% 100%,40px 40px,40px 40px;z-index:-1;transform:perspective(500px) rotateX(60deg);animation:gM 12s linear infinite;}
@keyframes gM{100%{background-position:0 0,0 0,0 40px,40px 0;}}
.c{background:var(--glass);backdrop-filter:blur(25px);padding:40px;border-radius:16px;border:2px solid var(--neon);box-shadow:0 0 30px rgba(0,242,254,0.25);width:100%;max-width:360px;box-sizing:border-box;}
h2{text-align:center;background:linear-gradient(135deg,var(--neon),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0;font-size:26px;}
input{width:100%;padding:14px;margin:10px 0;background:rgba(5,7,15,0.9);color:#fff;border:1px solid rgba(0,242,254,0.3);border-radius:8px;outline:none;box-sizing:border-box;font-family:inherit;}
input:focus{border-color:var(--pink);box-shadow:0 0 12px rgba(255,0,122,0.4);}
button{width:100%;padding:14px;background:linear-gradient(135deg,var(--neon),var(--purple));color:#fff;border:none;font-weight:700;border-radius:8px;cursor:pointer;margin-top:15px;}
a{color:var(--neon);text-decoration:none;display:block;text-align:center;margin-top:20px;font-size:14px;}
</style></head><body><div class="city-grid"></div><div class='c'><h2>CODEX // {{t.upper()}}</h2>
{%with m=get_flashed_messages()%}{%if m%}{%for msg in m%}<p style='color:var(--pink);text-align:center;'>⚡ {{msg}}</p>{%endfor%}{%endif%}{%endwith%}
<form method='POST'><input type='text' name='u' placeholder='// OPERATOR IDENTIFIER' required><input type='password' name='p' placeholder='// CHIP ACCESS KEY' required><button type='submit'>INITIALIZE UPLINK 📡</button></form>
{%if t=='Login'%}<a href='/register'>Create Profile</a>{%else%}<a href='/login'>Return to Node</a>{%endif%}</div></body></html>
