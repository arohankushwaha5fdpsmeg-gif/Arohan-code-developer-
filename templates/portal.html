<!DOCTYPE html><html><head><title>Portal</title><meta charset='UTF-8'><style>
body{font-family:sans-serif;background:#030407;position:relative;color:#fff;max-width:350px;margin:150px auto;padding:15px;height:100vh;overflow:hidden;}
body::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 30%,rgba(0,242,254,0.18) 0%,transparent 50%),radial-gradient(circle at 70% 70%,rgba(255,0,122,0.15) 0%,transparent 50%);z-index:-1;animation:spin 20s linear infinite;}
@keyframes spin{100%{transform:rotate(360deg);}}
.c{background:rgba(14,16,22,0.6);backdrop-filter:blur(30px);padding:30px;border-radius:14px;border:1px solid rgba(0,242,254,0.2);box-shadow:0 20px 50px rgba(0,242,254,0.15);}
h2{text-align:center;background:linear-gradient(135deg,#00f2fe,#ff007a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-top:0;}
input{width:100%;padding:13px;margin:8px 0;background:rgba(5,6,10,0.8);color:#fff;border:1px solid rgba(255,255,255,0.08);border-radius:8px;outline:none;}
button{width:100%;padding:13px;background:linear-gradient(135deg,#00f2fe,#7928ca);border:none;font-weight:bold;border-radius:8px;cursor:pointer;margin-top:12px;}
a{color:#00f2fe;text-decoration:none;display:block;text-align:center;margin-top:18px;font-size:13px;}
</style></head><body><div class='c'><h2>CodeX {{t}}</h2>{%with m=get_flashed_messages()%}{%if m%}{%for msg in m%}<p style='color:#ff007a;text-align:center;font-size:12px;'>{{msg}}</p>{%endfor%}{%endif%}{%endwith%}<form method='POST'><input type='text' name='u' placeholder='Identifier' required><input type='password' name='p' placeholder='Access Key' required><button type='submit'>Verify</button></form>{%if t=='Login'%}<a href='/register'>Register</a>{%else%}<a href='/login'>Login</a>{%endif%}</div></body></html>
