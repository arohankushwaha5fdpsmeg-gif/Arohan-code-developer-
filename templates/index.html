<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>CodeX Terminal</title>
<style>
:root{--bg:#04060e;--panel:rgba(11,14,26,0.75);--neon:#00f2fe;--pink:#ff007a;--purple:#7928ca;--text:#e2e8f0;}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--text);margin:0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.g-b{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(rgba(4,6,14,0.4) 0%,var(--bg) 90%),radial-gradient(circle at 50% 20%,rgba(0,242,254,0.15),transparent 55%),linear-gradient(rgba(0,242,254,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,242,254,0.04) 1px,transparent 1px);background-size:100% 100%,100% 100%,30px 30px,30px 30px;z-index:-2;}
.g-b::before{content:'';position:absolute;width:100%;height:100%;background:linear-gradient(transparent,rgba(255,0,122,0.05) 50%,transparent);animation:sc 6s linear infinite;z-index:-1;}
@keyframes sc{0%{transform:translateY(-100%);}100%{transform:translateY(100%);}}
header{background:var(--panel);backdrop-filter:blur(20px);padding:12px 25px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid rgba(0,242,254,0.3);}
.logo{font-weight:900;font-size:19px;letter-spacing:2px;background:linear-gradient(135deg,var(--neon),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.w{display:flex;flex:1;height:calc(100vh - 60px);padding:15px;gap:15px;box-sizing:border-box;}
.p-l,.p-r{flex:1;display:flex;flex-direction:column;background:var(--panel);backdrop-filter:blur(15px);border-radius:12px;border:1px solid rgba(0,242,254,0.2);padding:20px;box-sizing:border-box;}
textarea{flex:1;padding:18px;background:rgba(3,4,8,0.85);color:#34d399;border:1px solid rgba(0,242,254,0.15);border-radius:8px;outline:none;font-family:inherit;font-size:15px;resize:none;}
button{padding:15px;background:linear-gradient(135deg,var(--neon),var(--purple));color:#fff;border:none;font-weight:700;font-size:14px;border-radius:8px;cursor:pointer;}
button:disabled{background:#222533!important;color:#666!important;cursor:not-allowed;}
pre{flex:1;margin:0;background:rgba(2,3,6,0.9);padding:18px;color:#a7f3d0;overflow:auto;border-radius:8px;white-space:pre-wrap;border:1px solid rgba(255,255,255,0.04);font-size:14px;}
.lo{color:#fff;text-decoration:none;font-size:12px;padding:6px 12px;background:linear-gradient(135deg,var(--pink),#b91c1c);border-radius:6px;font-weight:700;}
</style></head><body><div class="g-b"></div><header><div class='logo'>CODEX // CORE TERMINAL</div>
<div style='display:flex;align-items:center;gap:16px;'><div style='font-size:13px;'>OPERATOR: <b style="color:var(--pink);">{{current_user.username.upper()}}</b> | QUOTA: <span style='color:var(--neon);font-weight:700;'><span id='tc'>{{current_user.tokens}}</span>/15 Tok</span></div><a href='/logout' class='lo'>EXIT</a></div></header>
<div class='w'><div class='p-l'><textarea id='p' placeholder='// INPUT BLUEPRINT SPECIFICATION DIRECTIVES...'></textarea><button onclick='g()' id='btn' style='margin-top:12px;'>EXECUTE META-COMPILER ⚡</button></div>
<div class='p-r'><pre id='o'># System online. Ready to execute core local scripts.</pre><button onclick='cp()' style='margin-top:12px;background:#070913;color:#fff;border:1px solid rgba(255,255,255,0.15);'>EXTRACT CODE MATRIX 📋</button></div></div>
<script>
document.getElementById('p').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();g();}});
function g(){const p=document.getElementById('p').value;if(!p.trim())return;const o=document.getElementById('o'),btn=document.getElementById('btn');o.innerText="# COMPILING LOCAL SYSTEM INTERFACES MATRIX...";btn.disabled=true;
fetch('/gen',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({p:p})}).then(res=>{if(res.status===402){alert("Quota empty.");throw new Error("Empty");}return res.json();}).then(data=>{if(data.c){let f=data.c;if(f.startsWith('"""')&&f.endsWith('"""'))f=f.slice(3,-3);o.innerText=f.replace(/\\n/g,'\n').replace(/\\t/g,'\t');document.getElementById('tc').innerText=data.r;document.getElementById('p').value="";}}).catch(e=>{if(e.message!=="Empty")o.innerText="# ENGINE ERROR.";}).finally(()=>{btn.disabled=false;});}
function cp(){navigator.clipboard.writeText(document.getElementById('o').innerText).then(()=>{alert('Copied!');});}
</script></body></html>
