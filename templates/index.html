<!DOCTYPE html><html><head><meta charset='UTF-8'><title>CodeX AI</title><style>
:root{--bg:#030408;--panel:rgba(10,12,18,0.8);--neon:#00f2fe;--p:#ff007a;--t:#e2e8f0;}
body{font-family:monospace;background:var(--bg);color:var(--t);margin:0;height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative;}
body::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 30% 20%,rgba(0,242,254,0.12) 0%,transparent 40%),radial-gradient(circle at 70% 80%,rgba(255,0,122,0.08) 0%,transparent 45%);z-index:-1;animation:pulse 8s infinite alternate;}
@keyframes pulse{0%{opacity:0.7;}100%{opacity:1;}}
header{background:var(--panel);backdrop-filter:blur(20px);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;}
.b{font-weight:700;font-size:16px;background:linear-gradient(135deg,var(--neon),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.w{display:flex;flex:1;height:calc(100vh - 55px);}.l,.r{flex:1;display:flex;flex-direction:column;padding:15px;box-sizing:border-box;}
textarea{flex:1;padding:15px;background:rgba(5,6,10,0.85);color:#34d399;border:1px solid rgba(0,242,254,0.15);border-radius:8px;outline:none;font-family:inherit;}
button{padding:12px;background:linear-gradient(135deg,var(--neon),#7928ca);border:none;font-weight:700;border-radius:6px;cursor:pointer;}
pre{flex:1;margin:0;background:rgba(3,4,6,0.9);padding:15px;color:#a7f3d0;overflow:auto;border-radius:6px;white-space:pre-wrap;border:1px solid rgba(255,255,255,0.03);}
.lo{color:#ef4444;text-decoration:none;font-size:12px;padding:4px 8px;background:rgba(239,68,68,0.05);border-radius:4px;}
</style></head><body><header><div class='b'>CodeX Terminal 🌌</div><div style='display:flex;align-items:center;gap:12px;'><div style='font-size:12px;'>User: <b>{{current_user.username}}</b> | Quota: <span style='color:var(--neon);'><span id='tc'>{{current_user.tokens}}</span>/15 Tok</span></div><a href='/logout' class='lo'>Exit</a></div></header>
<div class='w'><div class='l'><textarea id='p' placeholder='Ask me to generate a "neural network model", "image generator model", or "chatbot script"...'></textarea>
<button onclick='g()' style='margin-top:10px;'>Execute Meta-Compiler ✨</button></div>
<div class='r'><pre id='o'># Standby... Ready to build artificial intelligence modules.</pre>
<button onclick='cp()' style='margin-top:10px;background:#111;color:#fff;'>Copy Code Matrix 📋</button></div></div>
<script>
document.getElementById('p').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();g();}});
function g(){const p=document.getElementById('p').value;if(!p.trim())return;const o=document.getElementById('o');o.innerText="# Initiating Meta-AI compilation scripts...\\n# Assembling deep learning parameters...";
fetch('/gen',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({p:p})}).then(r=>r.json()).then(d=>{if(d.c){o.innerText=d.c;const s=document.getElementById('tc');if(s)s.innerText=d.r;}});}
function cp(){navigator.clipboard.writeText(document.getElementById('o').innerText);alert('AI Code Block Copied!');}
</script></body></html>
