<!DOCTYPE html><html><head><meta charset='UTF-8'><title>CodeX AI Pro</title><style>
:root{--bg:#030408;--panel:rgba(10,12,18,0.8);--border:rgba(0,242,254,0.15);--neon:#00f2fe;--p:#ff007a;--t:#e2e8f0;}
body{font-family:monospace;background:var(--bg);color:var(--t);margin:0;height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative;}
body::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 30% 20%,rgba(0,242,254,0.12) 0%,transparent 40%),radial-gradient(circle at 70% 80%,rgba(255,0,122,0.08) 0%,transparent 45%);z-index:-1;animation:pulse 8s ease-in-out infinite alternate;}
@keyframes pulse{0%{opacity:0.7;transform:scale(1);}100%{opacity:1;transform:scale(1.05);}}
header{background:var(--panel);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;z-index:10;}
.b{font-weight:700;font-size:16px;background:linear-gradient(135deg,var(--neon),var(--p));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.w{display:flex;flex:1;height:calc(100vh - 55px);}.l,.r{flex:1;display:flex;flex-direction:column;padding:15px;box-sizing:border-box;}.l{border-right:1px solid var(--255,255,255,0.05);}
textarea{flex:1;padding:15px;background:rgba(5,6,10,0.85);backdrop-filter:blur(10px);color:#34d399;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;resize:none;outline:none;line-height:1.5;}
textarea:focus{border-color:var(--neon);box-shadow:0 0 12px rgba(0,242,254,0.25);}
.bar{margin-top:10px;display:flex;gap:10px;}
button{padding:12px 20px;background:linear-gradient(135deg,var(--neon),#7928ca);border:none;font-weight:700;border-radius:6px;cursor:pointer;font-size:14px;transition:0.2s;}
button:hover{transform:translateY(-1px);box-shadow:0 5px 15px rgba(0,242,254,0.3);}
.cb{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;}
pre{flex:1;margin:0;background:rgba(3,4,6,0.9);backdrop-filter:blur(10px);padding:15px;color:#a7f3d0;overflow:auto;border-radius:6px;white-space:pre-wrap;border:1px solid rgba(255,255,255,0.03);line-height:1.5;}
.pay{padding:5px 10px;font-size:11px;border-radius:4px;cursor:pointer;background:transparent;border:1px solid var(--neon);color:var(--neon);font-weight:normal;}
.lo{color:#ef4444;text-decoration:none;font-size:12px;padding:4px 8px;background:rgba(239,68,68,0.05);border-radius:4px;border:1px solid rgba(239,68,68,0.15);}
</style></head><body><header><div class='b'>CodeX Quantum AI Terminal 🌌</div><div style='display:flex;align-items:center;gap:12px;'><div style='font-size:12px;'>User: <b>{{current_user.username}}</b> | Tier: <span style='color:var(--neon);font-weight:bold;'>{%if current_user.is_premium_plus%}👑 Plus{%elif current_user.is_premium%}💎 Prem{%else%}<span id='tc'>{{current_user.tokens}}</span>/15 Free Tokens{%endif%}</span></div><form action='/pay/premium' method='POST'><button type='submit' class='pay'>Upgrade Premium</button></form><form action='/pay/plus' method='POST'><button type='submit' class='pay' style='border-color:var(--p);color:var(--p);'>Upgrade Plus 👑</button></form><a href='/logout' class='lo'>Exit Portal</a></div></header>
<div class='w'><div class='l'><textarea id='p' placeholder='# Enter computational prompts... Press Enter to Execute.'></textarea>
<div class='bar'><button onclick='g()' style='width:100%;'>Execute Runtime Array (Enter) ✨</button></div></div>
<div class='r'><pre id='o'># CodeX Engine Standby... Awaiting core instruction sequences.</pre>
<div class='bar'><button onclick='cp()' class='cb' style='width:100%; margin-top:10px;'>Copy Output Matrix Data 📋</button></div></div></div>
<script>
document.getElementById('p').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();g();}});
function g(){const p=document.getElementById('p').value;if(!p.trim())return;const o=document.getElementById('o');o.innerText="# Initiating data pipelines...\\n# Fetching cluster compilation paths... ";
fetch('/gen',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({p:p})}).then(r=>r.json()).then(d=>{if(d.c){o.innerText=d.c;const s=document.getElementById('tc');if(s&&d.r!==undefined)s.innerText=d.r;}else{o.innerText=d.message;}}).catch(()=>{o.innerText='# Compilation Timeout. Please click execute button again.';});}
function cp(){const t=document.getElementById('o').innerText;navigator.clipboard.writeText(t);alert('Matrix parameters copied!');}
</script></body></html>
